<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* underline for heading */
        .heading-style {
            text-decoration: underline;
        }

        /* Make all labels bold */
        .form-label {
            font-weight: 600;
            color: #333;
        }
    </style>
</head>

<body>

    <section class="mt-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-10 border border-info p-4 shadow">

                    <!-- Heading -->
                    <h2 class="mb-4 text-center heading-style">Employee Details</h2>

                    <!-- ROW 1 -->
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Enter Name">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter Email">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">Phone No</label>
                            <input type="number" class="form-control" placeholder="Enter Phone Number">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">Alternate Phone No</label>
                            <input type="number" class="form-control" placeholder="Enter Alternate phone Number">
                        </div>
                    </div>

                    <!-- ROW 2 -->
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">DOB</label>
                            <input type="date" class="form-control">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">Aadhar Card NO</label>
                            <input type="number" class="form-control" placeholder="Enter Aadhar Number">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">PAN No</label>
                            <input type="text" class="form-control" placeholder="Enter PAN No.">
                        </div>

                        <div class="col-md-3 mb-3">
                            <label class="form-label">Attachment</label>
                            <input type="file" class="form-control">
                        </div>
                    </div>

                    <!-- ROW 3 -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Blood Group</label>
                            <select class="form-select">
                                <option selected disabled>Select Blood Group</option>
                                <option>A+</option>
                                <option>B+</option>
                                <option>O+</option>
                                <option>AB+</option>
                                <option>A-</option>
                                <option>B-</option>
                                <option>O-</option>
                                <option>AB-</option>
                            </select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Employee ID</label>
                            <input type="text" class="form-control" placeholder="Enter Employee ID">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Gender</label>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" value="Male">
                                <label class="form-check-label">Male</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" value="Female">
                                <label class="form-check-label">Female</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" value="Other">
                                <label class="form-check-label">Other</label>
                            </div>
                        </div>
                        <class class="col-md-4">
                            <label for="exampleFormControlInput1" class="form-label">Country</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Choose...</option>
                                <option value="1">US</option>
                                <option value="2">AUS</option>
                                <option value="3">IND</option>
                            </select>
                        </class>
                        <class class="col-md-4">
                            <label for="exampleFormControlInput1" class="form-label">State</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Choose...</option>
                                <option value="1">J&K</option>
                                <option value="2">MH</option>
                                <option value="3">UK</option>
                            </select>
                        </class>
                        <class class="col-md-4">
                            <label for="exampleFormControlInput1" class="form-label">City</label>
                            <select class="form-select" aria-label="Default select example">
                                <option selected>Choose...</option>
                                <option value="1">Pune</option>
                                <option value="2">Mumbai</option>
                                <option value="3">Nashik</option>
                            </select>
                        </class>
                        <div class="col-md-12  mb-3">
                            
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" placeholder="Enter Your Address">
                       
                        </div>
                    </div>

                    <!-- ROW 4 -->
                    <div class="row align-items-center">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">
                                Salary: <span id="salaryValue">50000</span>
                            </label>
                            <input type="range" class="form-range" min="10000" max="100000" value="50000"
                                id="salaryRange">
                        </div>

                        <div class="col-md-4 text-end">
                            <button class="btn btn-primary mt-4 w-100">Submit</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Salary Range Script -->
    <script>
        const range = document.getElementById("salaryRange");
        const value = document.getElementById("salaryValue");

        range.addEventListener("input", function () {
            value.textContent = range.value;
        });
    </script>

</body>

</html>
